name: Validate story data

on:
  pull_request:
    paths:
      - "data/chapters/**"
      - "tools/validate_story.py"
  push:
    branches: [main]
    paths:
      - "data/chapters/**"
      - "tools/validate_story.py"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/validate_story.py
